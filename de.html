<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DE Data Hub</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <script src="script.js" defer></script>
</head>

<body>

    <!-- TOP BAR -->
    <header class="topbar">
        <h1>📊 DE Data Hub</h1>
        <div id="stats"></div>
    </header>

    <main class="container wide">

        <!-- CONTROLS -->
        <section class="controls-bar">
            <select id="typeFilter">
                <option value="all">All Types</option>
            </select>

            <input id="globalSearch" placeholder="Search everything..." />

            <select id="pageSize">
                <option value="10">10 rows</option>
                <option value="25">25 rows</option>
                <option value="50">50 rows</option>
            </select>
        </section>

        <!-- TABLE -->
        <section class="table-card">

            <div id="loading" class="loading">Loading data...</div>

            <table id="dataTable" hidden>
                <thead>
                    <tr>
                        <th data-sort="Type">Type ⬍</th>
                        <th data-sort="Link">Link ⬍</th>
                        <th data-sort="Comments">Comments ⬍</th>
                    </tr>

                    <tr class="column-filters">
                        <th><input data-col="Type" placeholder="Filter Type"></th>
                        <th></th>
                        <th><input data-col="Comments" placeholder="Filter Comments"></th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <!-- PAGINATION -->
            <div class="pagination">
                <button id="prevBtn">← Prev</button>
                <span id="pageInfo"></span>
                <button id="nextBtn">Next →</button>
            </div>

        </section>

    </main>

</body>

</html>
