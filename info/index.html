<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>General Info Hub</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/styles/styles.css">

    <script>window.PAGE_TYPE = "info";</script>

    <script src="/js/utils.js" defer></script>
    <script src="/js/config.js" defer></script>
    <script src="/js/tableEngine.js" defer></script>
    <script src="/js/loader.js" defer></script>
</head>

<body>

    <header class="topbar">
        <h1>📊 General Info Hub</h1>
        <div id="stats"></div>
    </header>

    <main class="container wide">

        <section class="controls-bar">

            <select id="typeFilter">
                <option value="all">All Types</option>
            </select>

            <input id="globalSearch" placeholder="Search..." />

            <select id="pageSize">
                <option value="10">10 rows</option>
                <option value="25">25 rows</option>
                <option value="50">50 rows</option>
            </select>

            <!-- ✅ FIXED -->
            <div id="columnToggle" class="column-toggle"></div>

        </section>

        <section class="table-card">

            <div id="loading">Loading...</div>

            <table id="dataTable" hidden>
                <thead>
                    <tr id="tableHeadRow"></tr>
                    <tr class="column-filters" id="columnFiltersRow"></tr>
                </thead>
                <tbody></tbody>
            </table>

            <div class="pagination">
                <button id="prevBtn">←</button>
                <span id="pageInfo"></span>
                <button id="nextBtn">→</button>
            </div>

        </section>

    </main>

</body>

</html>
