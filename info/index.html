<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Info Hub</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/styles.css">
</head>

<body>

    <header class="topbar">
        <h1>📊 General Information Hub</h1>
        <div id="stats"></div>
    </header>

    <main class="container wide">

        <!-- CONTROLS -->
        <section class="controls-bar">

            <!-- ❗ OPTIONAL: Type filter (you can keep or remove) -->
            <select id="typeFilter">
                <option value="all">All Types</option>
            </select>

            <input id="globalSearch" placeholder="Search anything..." />

            <select id="pageSize">
                <option value="10">10 rows</option>
                <option value="25">25 rows</option>
                <option value="50">50 rows</option>
            </select>

        </section>

        <!-- COLUMN TOGGLE -->
        <section class="controls-bar">
            <strong>Columns:</strong>
            <div id="columnToggle"></div>
        </section>

        <!-- TABLE -->
        <section class="table-card">

            <div id="loading">Loading data...</div>

            <table id="dataTable" hidden>
                <thead>
                    <tr id="tableHeadRow"></tr>
                    <tr id="columnFiltersRow" class="column-filters"></tr>
                </thead>
                <tbody></tbody>
            </table>

            <!-- PAGINATION -->
            <div class="pagination">
                <button id="prevBtn">← Prev</button>
                <span id="pageInfo"></span>
                <button id="nextBtn">Next →</button>
            </div>

        </section>

    </main>

    <!-- PAGE TYPE -->
    <script>
        window.PAGE_TYPE = "info";
    </script>

    <!-- JS ORDER IS IMPORTANT -->
    <script src="/js/utils.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/tableEngine.js"></script>
    <script src="/js/loader.js"></script>

</body>

</html>
